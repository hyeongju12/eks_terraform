version: 0.2
env:
  git-credential-helper: yes
phases:
  install:
    # runtime-versions:
    #   runtime: correto11
    commands:
      - echo install kubectl
      - curl -LO "https://dl.k8s.io/release/v1.24.0/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl
  pre_build:
    commands:
      - aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
  build:
    commands:
      - docker build -t ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_NAME}:${APP_NAME}v$CODEBUILD_BUILD_NUMBER .
      - docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_NAME}:${APP_NAME}v$CODEBUILD_BUILD_NUMBER
  post_build:
    commands:
      - |
          mkdir -p ~/.aws
          cat <<EOF > ~/.aws/config
          [default]
          region = ${AWS_REGION}
          [profile dev]
          source_profile = default
          EOF
      - cat ~/.aws/config
      - |
          cat <<EOF > ~/.aws/credentials
          [default]
          aws_access_key_id = ${AWS_ACCESS_KEY}
          aws_secret_access_key = ${AWS_SECRET_KEY}
          EOF
      - aws eks update-kubeconfig --name ${EKS_CLUSTER_NAME} --region ${AWS_REGION}
      - |
        cat <<EOF > nginx-demo.yaml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${APP_NAME}
          namespace: ${NAMESPACE}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ${APP_NAME}
          template:
            metadata:
              labels:
                app: ${APP_NAME}
            spec:
              containers:
              - name: ${APP_NAME}
                image: ${AWS_ACCOUNT_ID}.hjyoo-ecr-2.registry_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_NAME}:${APP_NAME}v$CODEBUILD_BUILD_NUMBER
                ports:
                - containerPort: 8080
                resources:
                  limits:
                    memory: "256Mi"
                    cpu: "1"
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: ${SERVICE_NAME}
          namespace: ${NAMESPACE}
        spec:
          selector:
            app: ${APP_NAME}
          ports:
          - port: 80
            targetPort: 80
        ---
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: ${APP_NAME}-ingress
          namespace: ${NAMESPACE}
          annotations:
            kubernetes.io/ingress.class: nginx
          labels:
            app: ${APP_NAME}
        spec:
            rules:
            - http:
                paths:
                - pathType: Prefix
                  path: "/"
                  backend:
                    service: 
                      name: ${SERVICE_NAME}
                      port: 
                        number: 80
        EOF
      - cat nginx-demo.yaml
      - kubectl apply -f nginx-demo.yaml



